<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — Contract Manager</title>
    <link rel="stylesheet" href="{{ base_path }}/static/css/app.css?v={{ version_token }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1>📋 Contract Manager</h1>
            <h2>用户登录</h2>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ base_path }}/auth/login" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username"
                           value="{{ username or '' }}"
                           placeholder="请输入用户名"
                           required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password"
                           placeholder="请输入密码"
                           required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登 录</button>
            </form>

            <div class="login-footer">
                <p>演示账号: admin / admin123 &nbsp;|&nbsp; user / user123</p>
            </div>
        </div>
    </div>
</body>
</html>
