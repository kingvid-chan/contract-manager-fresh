{% extends "base.html" %}
{% block title %}{% if user %}编辑用户{% else %}新建用户{% endif %} — Contract Manager{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% if user %}编辑用户: {{ user.username }}{% else %}新建用户{% endif %}</h1>
    <a href="{{ base_path }}/users" class="btn btn-sm">返回列表</a>
</div>

<div class="card">
    <form method="post" class="form">
        <div class="form-group">
            <label for="username">用户名 <span class="required">*</span></label>
            <input type="text" id="username" name="username"
                   value="{{ user.username if user else '' }}"
                   required maxlength="64" autofocus>
        </div>
        <div class="form-group">
            <label for="password">
                {% if user %}新密码（留空不修改）{% else %}密码 <span class="required">*</span>{% endif %}
            </label>
            <input type="password" id="password" name="password"
                   {% if not user %}required{% endif %}
                   placeholder="{% if user %}留空则不修改密码{% endif %}">
        </div>
        <div class="form-group">
            <label for="role">角色</label>
            <select id="role" name="role">
                <option value="user" {% if user and user.role == 'user' %}selected{% endif %}>user (普通用户)</option>
                <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>admin (管理员)</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {% if user %}保存修改{% else %}创建用户{% endif %}
            </button>
            <a href="{{ base_path }}/users" class="btn btn-sm">取消</a>
        </div>
    </form>
</div>

{% if user %}
<div class="card">
    <h3>重置密码</h3>
    <form method="post" action="{{ base_path }}/users/{{ user.id }}/reset-password" class="form-inline">
        <div class="form-group">
            <input type="password" name="new_password" placeholder="输入新密码" required minlength="1">
        </div>
        <button type="submit" class="btn btn-warning">重置密码</button>
    </form>
</div>
{% endif %}
{% endblock %}
